schema {
  query: Query
  mutation: Mutation
}

input FloatFilterInput {
  equals: Float
  """greater than"""
  gt: Float
  """greater than or equal"""
  gte: Float
  """less than"""
  lt: Float
  """less than or equal"""
  lte: Float
}

type Mutation {
  createReading(characteristic_id: String!, value: Int!): reading!
}

type Query {
  characteristics(includeReadings: Boolean): [characteristic!]!
  reading(params: ReadingInputParams, skip: Int!, take: Int!): [reading!]!
}

input ReadingInputParams {
  value: FloatFilterInput
}

input UnitInputParams {
  """label of unit"""
  label: String
  """name of unit"""
  name: String
  """name of sensor"""
  sensor_name: String
}

type characteristic {
  id: ID!
  name: String!
  readings: [[reading!]!]
  unit: String!
}

type reading {
  characteristic_id: String!
  id: ID!
  value: Int!
}