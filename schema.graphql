schema {
  query: Query
  mutation: Mutation
}

input FloatFilterInput {
  equals: Float
  """greater than"""
  gt: Float
  """greater than or equal"""
  gte: Float
  """less than"""
  lt: Float
  """less than or equal"""
  lte: Float
}

type Mutation {
  createReading(sensor_id: String!, value: Int!): reading!
}

type Query {
  reading(params: ReadingInputParams): [reading!]!
  sensor(name: String!): [sensor!]!
  unit(params: UnitInputParams): [unit!]!
}

input ReadingInputParams {
  value: FloatFilterInput
}

input UnitInputParams {
  """label of unit"""
  label: String
  """name of unit"""
  name: String
  """name of sensor"""
  sensor_name: String
}

type reading {
  id: ID!
  sensor: sensor!
  sensor_id: String!
  value: Int!
}

type sensor {
  id: ID!
  name: String!
  readings: [[reading!]!]
  unit: unit!
  unit_id: String!
}

type unit {
  id: ID!
  label: String!
  name: String!
  sensor: sensor
}