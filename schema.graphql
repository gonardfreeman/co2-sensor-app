schema {
  query: Query
  mutation: Mutation
}

"""
A date-time string at UTC, such as 2007-12-03T10:15:30Z, compliant with the `date-time` format outlined in section 5.6 of the RFC 3339 profile of the ISO 8601 standard for representation of dates and times using the Gregorian calendar.
"""
scalar DateTime

input FloatFilterInput {
  equals: Float
  """greater than"""
  gt: Float
  """greater than or equal"""
  gte: Float
  """less than"""
  lt: Float
  """less than or equal"""
  lte: Float
}

type Mutation {
  createReading(characteristic_id: String!, value: Int!): reading!
}

type Query {
  characteristics(includeReadings: Boolean): [characteristic!]!
  readings(params: ReadingInputParams, skip: Int!, take: Int!): [reading!]!
}

input ReadingInputParams {
  characteristic_id: String
  value: FloatFilterInput
}

input UnitInputParams {
  """label of unit"""
  label: String
  """name of unit"""
  name: String
  """name of sensor"""
  sensor_name: String
}

type characteristic {
  id: ID!
  name: String!
  readings: [[reading!]!]
  unit: String!
}

type reading {
  characteristic_id: String!
  created_at: DateTime!
  id: ID!
  value: Int!
}